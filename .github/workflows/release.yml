name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crea ZIP Chrome (MV3)
        run: zip recman_chrome.zip manifest.json background.js content.js README.md

      - name: Installa web-ext
        run: npm install -g web-ext

      - name: Prepara directory Firefox
        run: |
          mkdir -p _ff
          cp background.js content.js README.md _ff/
          cp manifest_firefox.json _ff/manifest.json

      - name: Firma XPI via AMO (unlisted)
        run: |
          web-ext sign \
            --source-dir _ff \
            --artifacts-dir _signed \
            --channel unlisted \
            --api-key ${{ secrets.AMO_API_KEY }} \
            --api-secret ${{ secrets.AMO_API_SECRET }}

      - name: Rinomina XPI firmato
        run: cp _signed/*.xpi recman_firefox.xpi

      - name: Crea Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RecMan PoliMi ${{ github.ref_name }}"
          body: |
            ## Installazione Chrome
            1. Scarica **recman_chrome.zip** ed estrailo in una cartella
            2. Vai su `chrome://extensions` → attiva **Modalità sviluppatore** → **Carica estensione non pacchettizzata**
            3. Seleziona la cartella estratta

            ## Installazione Firefox
            1. Scarica **recman_firefox.xpi**
            2. Apri `about:addons` → ⚙️ → **Installa componente aggiuntivo da file...**
            3. Seleziona `recman_firefox.xpi` — installazione permanente, nessuna configurazione richiesta
          files: |
            recman_chrome.zip
            recman_firefox.xpi
